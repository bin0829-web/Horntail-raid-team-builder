<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>
  <script>
    (function () {
      const path = window.location.pathname.replace(/^\/+|\/+$/g, "");
      const reserved = ["", "index.html", "404.html", "team-tool", "room"];

      if (!reserved.includes(path)) {
        sessionStorage.setItem("room_slug", path);
        window.location.replace("/room");
      } else {
        window.location.replace("/team-tool");
      }
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
