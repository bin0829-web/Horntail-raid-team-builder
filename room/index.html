<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horntail 組隊小工具</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
      background: #f3f6fb;
      color: #1f2937;
    }

    .wrap {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    input {
      padding: 8px;
      margin: 5px;
    }

    button {
      padding: 8px 14px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>
<div class="wrap">

  <h1>Horntail 組隊小工具</h1>

  <div class="card">
    <div>房間 ID：<span id="roomId">讀取中...</span></div>
    <input id="shareLink" readonly style="width:100%" />
  </div>

  <div class="card">
    <h3>新增角色</h3>
    <input id="name" placeholder="名稱">
    <input id="level" placeholder="等級">
    <input id="job" placeholder="職業">
    <input id="power" placeholder="表攻">
    <button onclick="addChar()">新增</button>
  </div>

  <div class="card">
    <h3>成員列表</h3>
    <ul id="list"></ul>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  updateDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA2p-CSfZi-GzYrzQdd1dule99KMI49VeY",
  authDomain: "horntail-team-tool.firebaseapp.com",
  projectId: "horntail-team-tool",
  storageBucket: "horntail-team-tool.firebasestorage.app",
  messagingSenderId: "130726856752",
  appId: "1:130726856752:web:0cc428397ba7a6f14805f5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let roomId = "";

function getRoomRef() {
  return doc(db, "rooms", roomId);
}

async function prepareRoom() {
  const url = new URL(window.location.href);
  let id = url.searchParams.get("id");

  if (!id) {
    alert("缺少房間ID");
    window.location.href = "/team-tool";
    return;
  }

  roomId = id;

  document.getElementById("roomId").textContent = roomId;
  document.getElementById("shareLink").value =
    window.location.origin + "/" + roomId;

  const ref = getRoomRef();
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    alert("房間不存在");
    window.location.href = "/team-tool";
    return;
  }

  // 監聽資料
  onSnapshot(ref, (docSnap) => {
    const data = docSnap.data();
    render(data?.members || []);
  });
}

function render(list) {
  const ul = document.getElementById("list");
  ul.innerHTML = "";

  list.forEach((m) => {
    const li = document.createElement("li");
    li.textContent = `${m.name} Lv.${m.level} ${m.job} (${m.power})`;
    ul.appendChild(li);
  });
}

async function addChar() {
  const name = document.getElementById("name").value;
  const level = document.getElementById("level").value;
  const job = document.getElementById("job").value;
  const power = document.getElementById("power").value;

  const ref = getRoomRef();
  const snap = await getDoc(ref);

  const data = snap.data();
  const members = data.members || [];

  members.push({ name, level, job, power });

  await updateDoc(ref, { members });
}

prepareRoom();
</script>

</body>
</html>
